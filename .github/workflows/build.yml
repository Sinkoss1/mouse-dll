name: Build DLL

on: push

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build DLL
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cl /LD mouse.cpp /Fe:mouse.dll

      - name: Create ZIP
        shell: powershell
        run: Compress-Archive -Path mouse.dll -DestinationPath mouse.zip

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: mouse-dll
          path: mouse.zip
